spring:
  datasource:
    url: jdbc:mysql://localhost:3306/inventario
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false

server:
  port: 8085

backup:
  path: C:/backup/
  mysqldump: C:/xampp/mysql/bin/mysqldump.exe