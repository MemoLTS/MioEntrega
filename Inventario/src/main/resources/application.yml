spring:
  application:
    name: getawayspring

  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: inventario
              uri: http://localhost:8083
              predicates:
                - Path=/api/inventario/**

            - id: productos
              uri: http://localhost:8083
              predicates:
                - Path=/api/v1/inventario/productos/**

server:
  port: 8080

backup:
  path: C:/backup/
  mysqldump: C:/xampp/mysql/bin/mysqldump.exe